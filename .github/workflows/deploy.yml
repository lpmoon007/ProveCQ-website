name: Deploy to VPS

# Builds the static export and rsyncs it into the Plesk VPS doc-root over SSH,
# on every push to main. Same pattern as the belegendary.org deploy.
# Inert (build-only) until the DEPLOY_* repository secrets are set — so nothing
# deploys by accident. See DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build # next build with output:"export" → ./out

      - name: Deploy out/ to the VPS (rsync over SSH)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::warning::DEPLOY_SSH_KEY not set — skipping deploy (build still validated)."
            exit 0
          fi
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # --delete keeps the server matching the build; never touch .well-known
          # (SSL/ACME). Trailing slash on out/ copies contents, not the folder.
          rsync -avz --delete --exclude='.well-known' \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new" \
            out/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          echo "Deployed to $DEPLOY_HOST:$DEPLOY_PATH"

      - name: Notify IndexNow (Bing / Yandex / Seznam / Naver)
        # Runs only after a real deploy — the key file is live by now, so
        # IndexNow can verify it. Submits every URL in the freshly-built
        # sitemap. Non-fatal: a failed ping never fails the deploy.
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "No deploy happened — skipping IndexNow ping."
            exit 0
          fi
          python3 - <<'PY'
          import re, json, urllib.request
          key = "473796a8f45a8b1b58e0039f8c942eff"
          host = "provecq.com"
          with open("out/sitemap.xml", encoding="utf-8") as f:
              urls = re.findall(r"<loc>(.*?)</loc>", f.read())
          body = {
              "host": host,
              "key": key,
              "keyLocation": f"https://{host}/{key}.txt",
              "urlList": urls,
          }
          req = urllib.request.Request(
              "https://api.indexnow.org/IndexNow",
              data=json.dumps(body).encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print(f"IndexNow: HTTP {r.status} — submitted {len(urls)} URLs")
          except Exception as e:
              print(f"::warning::IndexNow ping failed (non-fatal): {e}")
          PY
